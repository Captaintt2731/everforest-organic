# Space Monkey — deep space backgrounds, everforest greens/teal as accents,
# cosmic purple highlights. Foreground warm sand from everforest.
#
# Semantic roles (Base16-aligned):
#   accent              = primary UI accent (borders, active states, links)
#   foreground          = primary text
#   background          = primary background
#   color0  black       = deep space void
#   color1  red         = nebula rose (error/critical)
#   color2  green       = everforest green (success/positive)
#   color3  yellow      = everforest gold (warning)
#   color4  blue        = everforest teal (primary accent/links)
#   color5  magenta     = cosmic purple (secondary accent)
#   color6  cyan        = everforest mint (informational)
#   color7  white       = warm sand (default foreground text)
#   color8-15           = bright variants

accent = "#7fbbb3"
cursor = "#d3c6aa"
foreground = "#d3c6aa"
background = "#0d0f14"
