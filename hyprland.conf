general {
    layout = dwindle
    gaps_in = 10
    gaps_out = 20
    border_size = 3
    col.active_border = rgba(7fbbb3de)
    col.inactive_border = rgba(7fbbb340)
}

decoration {
    rounding = 16
    dim_special = 0.0

    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = rgba(0a0c1280)
    }

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        xray = false
        contrast = 0.8
        brightness = 0.5
        noise = 0.2
        vibrancy = 80
        vibrancy_darkness = 0.0
        special = true
    }
}

animations {
    enabled = yes
    bezier = wind, 0.02, 0.9, 0.1, 1.03
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = fade, 1, 10, default
    animation = workspaces, 1, 1, wind
}
